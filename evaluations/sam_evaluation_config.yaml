# =============================================================================
# Cortex Agent Evaluation Configuration: Sam-the-Snowman (Drift walkthrough)
# =============================================================================
# Evaluates the same fixed five hard questions used in chapters 2 and 6.
#
# Usage:
#   CALL EXECUTE_AI_EVALUATION(
#     'START',
#     OBJECT_CONSTRUCT('run_name', 'sam-drift-eval-1'),
#     '@SNOWFLAKE_EXAMPLE.SAM_DRIFT.SAM_EVALUATION_CONFIG/sam_evaluation_config.yaml'
#   );
# =============================================================================

dataset:
  dataset_type: "CORTEX AGENT"
  table_name: "SNOWFLAKE_EXAMPLE.SAM_DRIFT.SAM_EVALUATION_DATA"
  dataset_name: "SAM_DRIFT_EVALUATION_DATASET"
  column_mapping:
    query_text: "INPUT_QUERY"
    ground_truth: "EXPECTED_OUTCOME"

evaluation:
  agent_params:
    agent_name: "SNOWFLAKE_EXAMPLE.SAM_DRIFT.SAM_THE_SNOWMAN"
    agent_type: "CORTEX AGENT"
  run_params:
    label: "Sam Drift walkthrough evaluation"
    description: "Evaluate naive-vs-ontology reliability on Drift Entertainment hard questions."
  source_metadata:
    type: "DATASET"
    dataset_name: "SAM_DRIFT_EVALUATION_DATASET"

metrics:
  - "answer_correctness"
  - "logical_consistency"
  - name: "drift_routing_fidelity"
    score_ranges:
      min_score: [1, 3]
      median_score: [4, 7]
      max_score: [8, 10]
    prompt: |
      You are grading whether Sam routed and reasoned correctly for Drift Entertainment.

      Input question: {{input}}
      Agent output: {{output}}
      Expected outcome guidance: {{ground_truth}}

      Score 1-3:
      - Wrong metric definition (especially revenue not using unit_price * quantity)
      - Missing required join path (support rep mapping, playlist + sales crossover, etc.)
      - Answer ignores key dimensions from the prompt

      Score 4-7:
      - Mostly correct but missing one critical element
      - Partial join logic or incomplete explanation of assumptions

      Score 8-10:
      - Correct metric logic
      - Correct entity/join path
      - Complete, direct answer with transparent assumptions
